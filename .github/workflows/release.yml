name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package macOS DMG
        run: npx electron-vite build && npx electron-builder --mac --arm64
        env:
          # Disable all code signing for unsigned personal builds
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          token: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package Windows installer
        run: npx electron-vite build && npx electron-builder --win --x64

      - name: Upload EXE to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
